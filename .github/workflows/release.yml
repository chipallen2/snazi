name: Release

# Publishes @chipallen2/snazi to npm whenever a version tag (v1.2.3) is pushed.
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. The initial
# version must be published manually once; after that configure the trusted
# publisher on npmjs.com (repo + this workflow filename: release.yml).
# Bump + tag + push in one step with `npm run release:patch` (see packages/snazi).
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm Trusted Publishing (OIDC)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest # Trusted Publishing requires a GitHub-hosted runner
    defaults:
      run:
        working-directory: packages/snazi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # ships npm 11.5.1+, required for OIDC publishing
          registry-url: 'https://registry.npmjs.org'

      # Pin the global npm to the 11.x line. npm@latest now resolves to 12.0.0,
      # which (a) has a broken provenance path (missing bundled 'sigstore',
      # npm/cli#9722) and (b) hard-blocks dependency install scripts by default.
      # 11.x is OIDC/provenance-capable (>= 11.5.1) and only warns on scripts.
      - run: npm install -g npm@11

      - run: npm ci

      # npm >= 11.16 blocks dependency install scripts by default (allowScripts
      # allowlist; hard-fails in npm 12). better-sqlite3 is a native addon whose
      # build script is allow-listed in package.json, but rebuild explicitly here
      # so the .node binary always exists for the test suite regardless of the
      # exact npm version the runner installs.
      - run: npm rebuild better-sqlite3

      - run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION | tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: OIDC proves the workflow identity to npm and
      # provenance is generated automatically (the flags are explicit intent).
      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
